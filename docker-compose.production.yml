version: '3.8'

services:
  spam-filter-api:
    build:
      context: .
      dockerfile: Dockerfile.production
    ports:
      - "8990:8990"
    environment:
      - ML_ENABLE=true
      - CUDA_VISIBLE_DEVICES=0  # Adjust based on your GPU setup
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - TORCH_CUDNN_V8_API_ENABLED=1
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - ./config:/app/config:ro
      - ./common:/app/common:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8990/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: Redis for caching (if needed)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  # Optional: Nginx load balancer for multiple instances
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - spam-filter-api
    restart: unless-stopped